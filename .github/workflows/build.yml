name: Build Multi-Platform

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - label: 'Windows-x64'
            os: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            output_name: '续杯助手-windows-x64.exe'

          # macOS Intel (x86_64) - 在 ARM64 runner 上交叉编译
          - label: 'macOS-Intel-x64'
            os: 'macos-latest'
            target: 'x86_64-apple-darwin'
            output_name: '续杯助手-mac-intel-x64.dmg'

          # macOS Apple Silicon (M1/M2/M3...)
          - label: 'macOS-AppleSilicon-arm64'
            os: 'macos-latest'
            target: 'aarch64-apple-darwin'
            output_name: '续杯助手-mac-apple-silicon-arm64.dmg'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ========== 前端 UI 反逆向混淆 ==========
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install obfuscator dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Obfuscate UI (in-place)
        run: node scripts/obfuscate.js --inplace

      # ========== Rust 编译 ==========
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      # ========== Windows: cargo build ==========
      - name: Build Windows binary
        if: runner.os == 'Windows'
        working-directory: ./src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "src-tauri/target/${{ matrix.target }}/release/cursor-renewal.exe"
          Copy-Item $src "${{ matrix.output_name }}" -Force
          Get-Item "${{ matrix.output_name }}" | Format-List Name, Length

      # ========== macOS: tauri build → .app + .dmg ==========
      - name: Install Tauri CLI
        if: runner.os == 'macOS'
        run: npm install -g @tauri-apps/cli@^1

      - name: Generate macOS icons (.icns)
        if: runner.os == 'macOS'
        run: |
          cd src-tauri
          # 用 tauri icon 从 PNG 生成所有格式（包含 .icns）
          tauri icon icons/icon.png || true
          # 如果 tauri icon 失败，用 sips+iconutil 手动生成
          if [ ! -f icons/icon.icns ]; then
            echo "Generating .icns manually..."
            mkdir -p /tmp/icon.iconset
            sips -z 16 16 icons/icon.png --out /tmp/icon.iconset/icon_16x16.png
            sips -z 32 32 icons/icon.png --out /tmp/icon.iconset/icon_16x16@2x.png
            sips -z 32 32 icons/icon.png --out /tmp/icon.iconset/icon_32x32.png
            sips -z 64 64 icons/icon.png --out /tmp/icon.iconset/icon_32x32@2x.png
            sips -z 128 128 icons/icon.png --out /tmp/icon.iconset/icon_128x128.png
            sips -z 256 256 icons/icon.png --out /tmp/icon.iconset/icon_128x128@2x.png
            sips -z 256 256 icons/icon.png --out /tmp/icon.iconset/icon_256x256.png
            sips -z 512 512 icons/icon.png --out /tmp/icon.iconset/icon_256x256@2x.png
            sips -z 512 512 icons/icon.png --out /tmp/icon.iconset/icon_512x512.png
            cp icons/icon.png /tmp/icon.iconset/icon_512x512@2x.png
            iconutil -c icns /tmp/icon.iconset -o icons/icon.icns
          fi
          ls -la icons/

      - name: Build macOS app bundle (.app + .dmg)
        if: runner.os == 'macOS'
        run: tauri build --target ${{ matrix.target }}

      - name: Strip symbols + Ad-hoc sign + create DMG
        if: runner.os == 'macOS'
        run: |
          APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP_FILE=$(ls -d "$APP_DIR"/*.app 2>/dev/null | head -1)
          if [ -z "$APP_FILE" ]; then
            echo "ERROR: No .app found in $APP_DIR"
            ls -la "$APP_DIR" || true
            exit 1
          fi

          # 1. 剥离符号表（反逆向）
          echo "=== Stripping symbols ==="
          # 直接从 MacOS 目录获取二进制文件（避免中文路径 plist 读取问题）
          BINARY_PATH=$(find "$APP_FILE/Contents/MacOS" -type f -perm +111 | head -1)
          if [ -z "$BINARY_PATH" ]; then
            BINARY_PATH="$APP_FILE/Contents/MacOS/续杯助手"
          fi
          echo "Binary: $BINARY_PATH"
          ls -lh "$BINARY_PATH" || true
          
          # strip -x: 移除本地符号，保留动态链接符号
          # strip -S: 移除调试符号
          strip -x -S "$BINARY_PATH" 2>/dev/null || true
          
          # 额外清理：移除 .dSYM 调试符号目录
          rm -rf "$APP_FILE.dSYM" 2>/dev/null || true
          rm -rf "$APP_DIR"/*.dSYM 2>/dev/null || true
          
          echo "After strip:"
          ls -lh "$BINARY_PATH"

          # 2. Ad-hoc 签名（让 macOS 显示"无法验证"而非"已损坏"）
          echo "=== Ad-hoc signing: $APP_FILE ==="
          codesign --force --deep --sign - "$APP_FILE"
          codesign --verify "$APP_FILE" && echo "✓ Signature valid"

          # 3. 安装 create-dmg
          brew install create-dmg || true

          # 4. 生成 DMG 背景图片
          bash scripts/create-dmg-background.sh /tmp/dmg-background.png

          # 5. 使用 create-dmg 创建美观的 DMG
          APP_NAME=$(basename "$APP_FILE" .app)
          DMG_OUT="${{ matrix.output_name }}"

          create-dmg \
            --volname "续杯助手" \
            --volicon "src-tauri/icons/icon.icns" \
            --background "/tmp/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 180 200 \
            --app-drop-link 480 200 \
            --hide-extension "$APP_NAME.app" \
            --no-internet-enable \
            "$DMG_OUT" \
            "$APP_FILE" \
          || {
            # 如果 create-dmg 失败，退回简单方式
            echo "⚠ create-dmg failed, fallback to hdiutil"
            DMG_TMP="/tmp/dmg_staging"
            rm -rf "$DMG_TMP" && mkdir -p "$DMG_TMP"
            cp -R "$APP_FILE" "$DMG_TMP/"
            ln -s /Applications "$DMG_TMP/Applications"
            hdiutil create -volname "续杯助手" -srcfolder "$DMG_TMP" -ov -format UDZO "$DMG_OUT"
          }
          echo "✓ DMG ready: $(ls -lh "$DMG_OUT")"

      # ========== Release ==========
      - name: Create Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.output_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
