name: Build Multi-Platform

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - label: 'Windows-x64'
            os: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            artifact_name: 'cursor-renewal-windows-x64'
            binary_name: 'cursor-renewal.exe'
            output_name: '续杯助手-windows-x64.exe'

          # macOS Intel (x86_64)
          - label: 'macOS-Intel-x64'
            os: 'macos-13'
            target: 'x86_64-apple-darwin'
            artifact_name: 'cursor-renewal-mac-x64'
            binary_name: 'cursor-renewal'
            output_name: '续杯助手-mac-intel-x64'

          # macOS Apple Silicon (M1/M2/M3...)
          - label: 'macOS-AppleSilicon-arm64'
            os: 'macos-latest'
            target: 'aarch64-apple-darwin'
            artifact_name: 'cursor-renewal-mac-arm64'
            binary_name: 'cursor-renewal'
            output_name: '续杯助手-mac-apple-silicon-arm64'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========== 前端 UI 反逆向混淆 ==========
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install obfuscator dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Obfuscate UI (in-place)
        run: node scripts/obfuscate.js --inplace
        # 直接覆盖 ui/ 目录（CI runner 是临时环境）
        # 控制流平坦化 + 字符串数组 + 标识符乱码 + 控制台静默 + selfDefending

      # ========== Rust 编译 ==========
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install macOS dependencies
        if: startsWith(matrix.os, 'macos')
        run: |
          # Tauri 1.x 在 macOS 上 cargo build 自带依赖，无需额外安装
          echo "macOS environment ready"

      - name: Build release binary
        working-directory: ./src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      # ========== 重命名产物 ==========
      - name: Rename Windows binary
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $src = "src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          $dst = "src-tauri/target/${{ matrix.target }}/release/${{ matrix.output_name }}"
          Copy-Item $src $dst -Force
          Get-Item $dst | Format-List Name, Length, LastWriteTime

      - name: Rename macOS binary + chmod
        if: startsWith(matrix.os, 'macos')
        run: |
          src="src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          dst="src-tauri/target/${{ matrix.target }}/release/${{ matrix.output_name }}"
          cp "$src" "$dst"
          chmod +x "$dst"
          ls -la "$dst"

      # ========== 上传 artifact ==========
      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.output_name }}
          retention-days: 30

      - name: Upload artifact (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.output_name }}
          retention-days: 30

      # ========== 推 tag 时自动创建 Release ==========
      - name: Create Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/${{ matrix.output_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
