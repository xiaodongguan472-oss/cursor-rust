name: Build Multi-Platform

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - label: 'Windows-x64'
            os: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            output_name: '续杯助手-windows-x64.exe'

          # macOS Intel (x86_64) - 在 ARM64 runner 上交叉编译
          - label: 'macOS-Intel-x64'
            os: 'macos-latest'
            target: 'x86_64-apple-darwin'
            output_name: '续杯助手-mac-intel-x64.dmg'

          # macOS Apple Silicon (M1/M2/M3...)
          - label: 'macOS-AppleSilicon-arm64'
            os: 'macos-latest'
            target: 'aarch64-apple-darwin'
            output_name: '续杯助手-mac-apple-silicon-arm64.dmg'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ========== 前端 UI 反逆向混淆 ==========
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install obfuscator dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Obfuscate UI (in-place)
        run: node scripts/obfuscate.js --inplace

      # ========== Rust 编译 ==========
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      # ========== Windows: cargo build ==========
      - name: Build Windows binary
        if: runner.os == 'Windows'
        working-directory: ./src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "src-tauri/target/${{ matrix.target }}/release/cursor-renewal.exe"
          Copy-Item $src "${{ matrix.output_name }}" -Force
          Get-Item "${{ matrix.output_name }}" | Format-List Name, Length

      # ========== macOS: tauri build → .app + .dmg ==========
      - name: Install Tauri CLI
        if: runner.os == 'macOS'
        run: npm install -g @tauri-apps/cli@^1

      - name: Build macOS app bundle (.app + .dmg)
        if: runner.os == 'macOS'
        run: tauri build --target ${{ matrix.target }}

      - name: Prepare macOS DMG artifact
        if: runner.os == 'macOS'
        run: |
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          echo "=== Bundle output ==="
          ls -laR src-tauri/target/${{ matrix.target }}/release/bundle/ || true
          DMG_FILE=$(ls "$DMG_DIR"/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_FILE" ]; then
            cp "$DMG_FILE" "${{ matrix.output_name }}"
            echo "DMG ready: $(ls -lh "${{ matrix.output_name }}")"
          else
            echo "WARNING: DMG not found, packaging .app as zip"
            APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
            APP_FILE=$(ls -d "$APP_DIR"/*.app 2>/dev/null | head -1)
            if [ -n "$APP_FILE" ]; then
              ditto -c -k --sequesterRsrc --keepParent "$APP_FILE" "${{ matrix.output_name }}.zip"
              mv "${{ matrix.output_name }}.zip" "${{ matrix.output_name }}"
              echo "App zip ready: $(ls -lh "${{ matrix.output_name }}")"
            else
              echo "ERROR: No .app or .dmg found"
              exit 1
            fi
          fi

      # ========== Release ==========
      - name: Create Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.output_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
